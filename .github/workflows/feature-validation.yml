name: Feature Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'features.config.ts'
      - 'frontend/features/**'
      - 'convex/features/**'
      - 'convex/features/menus/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'features.config.ts'
      - 'frontend/features/**'
      - 'convex/features/**'
      - 'convex/features/menus/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Features

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate permission checks
        run: pnpm run validate:permissions

      - name: Validate audit logging
        run: pnpm run validate:audit

      - name: Validate feature config schema
        run: pnpm run validate:features

      - name: Check feature sync
        run: pnpm run sync:features

      - name: Verify manifest is up to date
        run: |
          if git diff --quiet convex/features/menus/menu_manifest_data.ts convex/features/menus/optional_features_catalog.ts; then
            echo "✅ Manifest is up to date"
          else
            echo "❌ Manifest is out of sync with features.config.ts"
            echo "Please run 'pnpm run sync:features' and commit the changes"
            git diff convex/features/menus/menu_manifest_data.ts convex/features/menus/optional_features_catalog.ts
            exit 1
          fi

      - name: Run feature tests
        run: pnpm run test -- tests/features

      - name: Validate all schemas
        run: pnpm run validate:all

  lint:
    runs-on: ubuntu-latest
    name: Lint Features

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
