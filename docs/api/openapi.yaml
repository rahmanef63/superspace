openapi: 3.0.3
info:
  title: SuperSpace API
  description: Public API for external web applications to integrate with SuperSpace's mature features.
  version: 1.0.0
servers:
  - url: https://your-convex-deployment-url.convex.site/api/v1
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API_KEY

security:
  - bearerAuth: []

paths:
  /cms/posts:
    get:
      summary: Get CMS Posts
      description: Retrieve a list of published CMS posts.
      tags:
        - CMS
      parameters:
        - in: query
          name: locale
          schema:
            type: string
            default: en
          description: Language locale
      responses:
        '200':
          description: A list of posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object

  /crm/leads:
    post:
      summary: Create a new CRM Lead
      description: Ingest a lead from an external application.
      tags:
        - CRM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                source:
                  type: string
      responses:
        '201':
          description: Lead created successfully
        '400':
          description: Validation error

  /projects/tasks:
    post:
      summary: Create a Project Task
      description: Create a task or ticket in a project board.
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                description:
                  type: string
                priority:
                  type: string
                  enum: [low, medium, high]
                assigneeId:
                  type: string
      responses:
        '201':
          description: Task created successfully
